<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOLO Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #aaa;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    video, #result {
      width: 100%;
      max-width: 640px;
      border-radius: 10px;
      background: #222;
      display: block;
    }

    #result {
      margin-top: 16px;
      min-height: 40px;
    }

    button {
      margin-top: 16px;
      width: 100%;
      max-width: 640px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:active { background: #1d4ed8; }
    button:disabled { background: #555; cursor: not-allowed; }

    #status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #888;
    }

    canvas { display: none; }
  </style>
</head>
<body>
  <h2>YOLO Detection</h2>
  <video id="vid" autoplay muted playsinline></video>
  <button id="btn" onclick="capture()">Capture & Detect</button>
  <p id="status">Waiting for camera...</p>
  <canvas id="canvas"></canvas>
  <img id="result" />

  <script>
    const video = document.getElementById("vid");
    const canvas = document.getElementById("canvas");
    const result = document.getElementById("result");
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } })
      .then(stream => {
        video.srcObject = stream;
        status.textContent = "Camera ready";
      })
      .catch(err => {
        status.textContent = "Camera error: " + err.message;
      });

    function capture() {
      btn.disabled = true;
      btn.textContent = "Processing...";
      status.textContent = "Running detection...";

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);

      fetch("/detect", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: canvas.toDataURL("image/jpeg", 0.8) })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          status.textContent = "Error: " + data.error;
        } else {
          result.src = data.image;
          status.textContent = "Done!";
        }
      })
      .catch(err => {
        status.textContent = "Request failed: " + err.message;
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = "Capture & Detect";
      });
    }
  </script>
</body>
</html>
